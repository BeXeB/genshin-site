<div class="container">
  <div class="header">
    <div class="logo">
      <img src="{{ getIcon() }}" />
    </div>
    <div class="introducion">Kalandorok Kézikönyve</div>
  </div>

  <div class="flex-wrap-center">
    @for (qa of quickAccesses; track $index) {
      <div class="card quick-access-card" [routerLink]="qa.link">
        <div class="title">{{ qa.title }}</div>
        <div class="description">{{ qa.description }}</div>
      </div>
    }
  </div>
</div>
