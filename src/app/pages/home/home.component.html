<div class="container">
  <div class="header">
    <div class="logo">
      <img src="{{ getIcon() }}" />
    </div>
    <div class="introducion">Kalandorok Kézikönyve</div>
  </div>

  <div class="flex-wrap-center">
    @for (qa of quickAccesses; track $index) {
      <div class="card quick-access-card" [routerLink]="qa.link">
        <div class="title">{{ qa.title }}</div>
        <div class="description">{{ qa.description }}</div>
      </div>
    }
  </div>

  <div class="footer">
    <!-- Ko-fi -->
    <a href="https://ko-fi.com/bexeb" target="_blank" class="footer-item">
      <span>Támogass!</span>
      <img src="assets/images/kofi_logo.svg" class="footer-icon" />
    </a>
    <!-- discord link -->
    <a href="https://discord.gg/MrmJpT6fUg" target="_blank" class="footer-item">
      <span>Csatlakozz a közösséghez!</span>
      <img src="assets/images/Discord-Logo-White.svg" class="footer-icon" />
    </a>
  </div>
</div>
