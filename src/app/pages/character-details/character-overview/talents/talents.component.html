<div class="skills-container">
  @if (char && skills) {
    @if (skills.combat1) {
      <app-skill-details
        [skill]="skills.combat1"
        [elementColor]="elementColor"
        [imageUrl]="skillImageUrls.combat1"
        [briefDescription]="getDescription(skills.combat1, 'combat1')"
      ></app-skill-details>
    }
    @if (skills.combat2) {
      <hr [style.color]="elementColor" />
      <app-skill-details
        [skill]="skills.combat2"
        [elementColor]="elementColor"
        [imageUrl]="skillImageUrls.combat2"
        [briefDescription]="getDescription(skills.combat2, 'combat2')"
      ></app-skill-details>
    }

    @if (skills.combat3) {
      <hr [style.color]="elementColor" />
      <app-skill-details
        [skill]="skills.combat3"
        [elementColor]="elementColor"
        [imageUrl]="skillImageUrls.combat3"
        [briefDescription]="getDescription(skills.combat3, 'combat3')"
      ></app-skill-details>
    }
    @if (skills.passive1) {
      <hr [style.color]="elementColor" />
      <app-skill-details
        [skill]="skills.passive1"
        [elementColor]="elementColor"
        [imageUrl]="skillImageUrls.passive1"
        [briefDescription]="getDescription(skills.passive1, 'passive1')"
      ></app-skill-details>
    }
    @if (skills.passive2) {
      <hr [style.color]="elementColor" />
      <app-skill-details
        [skill]="skills.passive2"
        [elementColor]="elementColor"
        [imageUrl]="skillImageUrls.passive2"
        [briefDescription]="getDescription(skills.passive2, 'passive2')"
      ></app-skill-details>
    }
    @if (skills.passive3) {
      <hr [style.color]="elementColor" />
      <app-skill-details
        [skill]="skills.passive3"
        [elementColor]="elementColor"
        [imageUrl]="skillImageUrls.passive3"
        [briefDescription]="getDescription(skills.passive3, 'passive3')"
      ></app-skill-details>
    }
    @if (skills.passive4) {
      <hr [style.color]="elementColor" />
      <app-skill-details
        [skill]="skills.passive4"
        [elementColor]="elementColor"
        [imageUrl]="skillImageUrls.passive4"
        [briefDescription]="getDescription(skills.passive4, 'passive4')"
      ></app-skill-details>
    }
  }
</div>
