<div class="container">
  <app-page-title [title]="'Materialok'" [backLink]="'/'"></app-page-title>
  <div class="search-bar">
    <input
      type="text"
      placeholder="Materialok keresése..."
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearchTermChange()"
    />
  </div>
  <div class="materials">
    @for (material of materials; track $index) {
      <app-item-card
        [routerLink]="`/materials/${material.normalizedName}`"
        [style.display]="
          filteredMaterials.includes(material) ? 'block' : 'none'
        "
        [imageUrl]="getImage(material)"
        [itemName]="material.name"
        [rarity]="material.rarity ?? 1"
      >
      </app-item-card>
    }
  </div>
</div>
