<div [style.border-color]="getColor()" class="item-card">
  <div #iconsContainer class="icons">
    <ng-content select="[icon-slot]"></ng-content>
  </div>
  <div [class.no-icons]="!hasIcons" class="item-icon">
    <img [src]="imageUrl" [alt]="itemName" [title]="itemName" />
  </div>
  <p>{{ itemName }}</p>
</div>
